kind: Deployment
apiVersion: apps/v1
metadata:
  name: bankapp-deployment
  namespace: bankapp-ns
  labels:
    app: bankapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
        - name: bankapp
          image: dsusmit63/ai-bankapp:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: bankapp-configmap
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bankapp-secrets
                  key: MYSQL_PASSWORD
     
